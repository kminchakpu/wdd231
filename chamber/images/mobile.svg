      <rect x="15" y="55" width="65" height="48" class="bg-wireframe" />
      <line x1="15" y1="55" x2="80" y2="103" class="cross-line" />
      <line x1="15" y1="103" x2="80" y2="55" class="cross-line" />
      <text x="92" y="68" class="text-muted" font-weight="bold">EMAIL: <tspan class="text-body" font-weight="normal">info@gmail.com</tspan></text>
      <text x="92" y="84" class="text-muted" font-weight="bold">PHONE: <tspan class="text-body" font-weight="normal">800-555-1234</tspan></text>
      <text x="92" y="100" class="text-muted" font-weight="bold">URL: <tspan class="text-body" font-weight="normal">mybusiness.com</tspan></text>
    </g>
    
    <g id="m2-spotlight-card-2" transform="translate(15, 210)">
      <rect x="0" y="0" width="370" height="115" class="bg-card" rx="6" />
      <text x="185" y="22" class="text-primary">Business Name</text>
      <text x="185" y="38" class="text-muted-center" font-style="italic">Business Tag Line</text>
      <line x1="15" y1="46" x2="355" y2="46" stroke="#cbd5e1" />
      <rect x="15" y="55" width="65" height="48" class="bg-wireframe" />
      <line x1="15" y1="55" x2="80" y2="103" class="cross-line" />
      <line x1="15" y1="103" x2="80" y2="55" class="cross-line" />
      <text x="92" y="68" class="text-muted" font-weight="bold">EMAIL: <tspan class="text-body" font-weight="normal">info@gmail.com</tspan></text>
      <text x="92" y="84" class="text-muted" font-weight="bold">PHONE: <tspan class="text-body" font-weight="normal">800-555-1234</tspan></text>
      <text x="92" y="100" class="text-muted" font-weight="bold">URL: <tspan class="text-body" font-weight="normal">mybusiness.com</tspan></text>
    </g>

    <g id="m2-spotlight-card-3" transform="translate(15, 340)">
      <rect x="0" y="0" width="370" height="115" class="bg-card" rx="6" />
      <text x="185" y="22" class="text-primary">Business Name</text>
      <text x="185" y="38" class="text-muted-center" font-style="italic">Business Tag Line</text>
      <line x1="15" y1="46" x2="355" y2="46" stroke="#cbd5e1" />
      <rect x="15" y="55" width="65" height="48" class="bg-wireframe" />
      <line x1="15" y1="55" x2="80" y2="103" class="cross-line" />
      <line x1="15" y1="103" x2="80" y2="55" class="cross-line" />
      <text x="92" y="68" class="text-muted" font-weight="bold">EMAIL: <tspan class="text-body" font-weight="normal">info@gmail.com</tspan></text>
      <text x="92" y="84" class="text-muted" font-weight="bold">PHONE: <tspan class="text-body" font-weight="normal">800-555-1234</tspan></text>
      <text x="92" y="100" class="text-muted" font-weight="bold">URL: <tspan class="text-body" font-weight="normal">mybusiness.com</tspan></text>
    </g>

    <g id="m2-footer-zone" transform="translate(15, 470)">
      <rect x="0" y="0" width="370" height="175" fill="#e2e8f0" stroke="#cbd5e1" />
      <text x="15" y="22" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="bold" fill="#172A3A">Kano Chamber of Commerce</text>
      <text x="15" y="40" class="text-body">20 Murtala Mohammed Way, Sharada Kano</text>
      <text x="15" y="56" class="text-body">info@kanochambers.com</text>
      <text x="15" y="72" class="text-body">(234) 8069 444420</text>
      <circle cx="40" cy="100" r="12" fill="#94a3b8" />
      <circle cx="40" cy="100" r="6" fill="#e2e8f0" />
      <polygon points="38,97 44,100 38,103" fill="#94a3b8" />
      <circle cx="75" cy="100" r="12" fill="#94a3b8" />
      <text x="75" y="104" font-family="sans-serif" font-size="13" font-weight="bold" fill="#e2e8f0" text-anchor="middle">𝕏</text>
      <circle cx="110" cy="100" r="12" fill="#94a3b8" />
      <text x="110" y="103" font-family="sans-serif" font-size="12" font-weight="bold" fill="#e2e8f0" text-anchor="middle">in</text>
      <text x="15" y="132" class="text-muted">WDD231 Class Project</text>
      <text x="15" y="148" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="bold" fill="#172A3A">Kevin Cross Minchakpu</text>
      <text x="15" y="164" font-family="'Segoe UI', sans-serif" font-size="11" fill="#64748b">© 2026 Kano Chambers | Mod: 2026-06-29</text>
