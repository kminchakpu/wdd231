<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 900" width="100%" height="auto">
  <defs>
    <style>
      .bg-canvas { fill: #f1f5f9; }
      .bg-main { fill: #f8f9fa; }
      .bg-card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1; }
      .bg-wireframe { fill: #e2e8f0; stroke: #94a3b8; stroke-width: 1; }
      .text-primary { font-family: 'Play', 'Segoe UI', sans-serif; font-size: 15px; fill: #172A3A; font-weight: bold; text-anchor: middle; }
      .text-body { font-family: 'Segoe UI', sans-serif; font-size: 13px; fill: #475569; }
      .text-muted { font-family: 'Segoe UI', sans-serif; font-size: 12px; fill: #64748b; }
      .text-muted-center { font-family: 'Segoe UI', sans-serif; font-size: 12px; fill: #64748b; text-anchor: middle; }
      .text-header-title { font-family: 'Play', sans-serif; font-size: 16px; fill: #172A3A; font-weight: bold; }
      .bar-label { fill: #475569; }
      .bar-text { font-family: 'Play', sans-serif; font-size: 14px; fill: #ffffff; font-weight: bold; text-anchor: middle; }
      .cross-line { stroke: #94a3b8; stroke-width: 1; stroke-dasharray: 3 3; }
      .btn-bg { fill: #cbd5e1; stroke: #94a3b8; stroke-width: 1; rx: 4; }
      .btn-text { font-family: 'Segoe UI', sans-serif; font-size: 11px; fill: #172A3A; font-weight: bold; text-anchor: middle; }
    </style>
  </defs>
  
  <rect width="830" height="900" class="bg-canvas" />

  <g id="mobile-screen-1" transform="translate(15, 0)">
    <rect width="400" height="900" class="bg-main" stroke="#cbd5e1" stroke-width="1" />
    <g id="m1-header-zone">
      <rect x="15" y="15" width="370" height="65" class="bg-wireframe" />
      <rect x="25" y="30" width="30" height="30" fill="none" stroke="#94a3b8" stroke-width="1.5" />
      <polygon points="25,55 35,42 42,49 49,38 55,55" fill="none" stroke="#94a3b8" stroke-width="1.5" />
      <circle cx="48" cy="38" r="2.5" fill="none" stroke="#94a3b8" stroke-width="1.5" />
      <text x="65" y="44" class="text-header-title">Kano Chamber</text>
      <text x="65" y="60" class="text-header-title" font-size="14">of Commerce</text>
      <circle cx="315" cy="48" r="9" fill="none" stroke="#172A3A" stroke-width="1.5" />
      <path d="M 315,39 A 9,9 0 0,1 315,57 Z" fill="#172A3A" />
      <line x1="345" y1="40" x2="368" y2="40" stroke="#172A3A" stroke-width="2.5" stroke-linecap="round" />
      <line x1="345" y1="48" x2="368" y2="48" stroke="#172A3A" stroke-width="2.5" stroke-linecap="round" />
      <line x1="345" y1="56" x2="368" y2="56" stroke="#172A3A" stroke-width="2.5" stroke-linecap="round" />
    </g>
    <g id="m1-hero-zone">
      <rect x="15" y="95" width="370" height="160" class="bg-wireframe" />
      <line x1="15" y1="95" x2="385" y2="255" class="cross-line" />
      <line x1="15" y1="255" x2="385" y2="95" class="cross-line" />
      <rect x="245" y="210" width="125" height="30" class="btn-bg" />
      <text x="307" y="229" class="btn-text">Keynote Tickets</text>
    </g>
    <text x="15" y="295" font-family="'Play', sans-serif" font-size="24" font-weight="bold" fill="#172A3A">Home</text>
    <g id="m1-events-card">
      <rect x="15" y="315" width="370" height="180" class="bg-card" />
      <rect x="15" y="315" width="370" height="32" class="bar-label" />
      <text x="185" y="336" class="bar-text">Events</text>
      <rect x="25" y="360" width="350" height="120" fill="#f1f5f9" stroke="#e2e8f0" />
    </g>
    <g id="m1-current-weather-card">
      <rect x="15" y="515" width="370" height="210" class="bg-card" />
      <rect x="15" y="515" width="370" height="32" class="bar-label" />
      <text x="185" y="536" class="bar-text">Current Weather</text>
      <circle cx="60" cy="585" r="15" fill="none" stroke="#94a3b8" stroke-width="2" />
      <path d="M 52,597 C 52,589 75,585 80,593 C 88,593 88,605 75,605 Z" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5" />
      <text x="110" y="585" font-family="'Play', sans-serif" font-size="20" font-weight="bold" fill="#172A3A">75° F</text>
      <text x="110" y="603" class="text-body" font-weight="600">Party Cloudy</text>
      <text x="30" y="635" class="text-body">High: 85°</text>
      <text x="150" y="635" class="text-body">Low: 52°</text>
      <text x="30" y="660" class="text-body">Humidity: 34%</text>
      <text x="30" y="685" class="text-muted">Sunrise: 7:30am</text>
      <text x="190" y="685" class="text-muted">Sunset: 9:59pm</text>
    </g>
    <g id="m1-weather-forecast-card">
      <rect x="15" y="740" width="370" height="145" class="bg-card" />
      <rect x="15" y="740" width="370" height="32" class="bar-label" />
      <text x="185" y="761" class="bar-text">Weather Forecast</text>
      <text x="30" y="800" class="text-body">Today: <tspan font-weight="bold" fill="#172A3A">90°F</tspan></text>
      <line x1="30" y1="813" x2="370" y2="813" stroke="#e2e8f0" />
      <text x="30" y="840" class="text-body">Wednesday: <tspan font-weight="bold" fill="#172A3A">89°F</tspan></text>
    </g>
  </g>

  <g id="mobile-screen-2" transform="translate(415, 0)">
